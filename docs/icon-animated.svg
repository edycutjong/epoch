<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--primary, #ffaa00)"/>
      <stop offset="100%" stop-color="var(--accent, #00f0ff)"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      :root {
        --primary: #ffaa00;
        --accent: #00f0ff;
      }

      /* Enclave Ring Pulse */
      .enclave-ring {
        transform-origin: 256px 256px;
        animation: enclave-pulse 4s ease-in-out infinite;
      }
      @keyframes enclave-pulse {
        0%, 100% {
          opacity: 0.15;
          stroke-width: 6;
          transform: scale(0.99);
        }
        50% {
          opacity: 0.45;
          stroke-width: 9;
          transform: scale(1.01);
        }
      }

      /* Slow Ticks Rotation */
      .clock-ticks {
        transform-origin: 256px 256px;
        animation: ticks-rotate 60s linear infinite;
      }
      @keyframes ticks-rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* Vault Shield Glow */
      .vault-contour {
        animation: vault-glow 6s ease-in-out infinite;
      }
      @keyframes vault-glow {
        0%, 100% {
          stroke-width: 12;
          opacity: 0.9;
        }
        50% {
          stroke-width: 13.5;
          opacity: 1;
        }
      }

      /* Trickling Sand dash flow */
      .sand-stream-line {
        animation: trickle 0.8s linear infinite;
      }
      @keyframes trickle {
        to {
          stroke-dashoffset: -24;
        }
      }

      /* Active Radar Sweep Hand */
      .active-hand {
        transform-origin: 256px 256px;
        animation: radar-sweep 4s linear infinite;
      }
      @keyframes radar-sweep {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* Core Pulsing Lock */
      .core-lock {
        animation: lock-pulse 2s ease-in-out infinite;
      }
      @keyframes lock-pulse {
        0%, 100% {
          r: 14;
        }
        50% {
          r: 16;
        }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0b0d" rx="96"/>

  <!-- Outer Clock/Ring -->
  <circle class="enclave-ring" cx="256" cy="256" r="180" fill="none" stroke="url(#brandGrad)" stroke-width="8" opacity="0.2"/>

  <!-- Monotonic Ticks -->
  <g class="clock-ticks" stroke="url(#brandGrad)" stroke-width="4" stroke-linecap="round" opacity="0.4">
    <line x1="256" y1="96" x2="256" y2="116"/>
    <line x1="256" y1="396" x2="256" y2="416"/>
    <line x1="96" y1="256" x2="116" y2="256"/>
    <line x1="396" y1="256" x2="416" y2="256"/>
    <line x1="143" y1="143" x2="157" y2="157"/>
    <line x1="355" y1="143" x2="341" y2="157"/>
    <line x1="143" y1="369" x2="157" y2="355"/>
    <line x1="355" y1="369" x2="341" y2="355"/>
  </g>

  <!-- Central Shield Vault + Hourglass -->
  <g filter="url(#neonGlow)">
    <!-- Vault Outer Contour -->
    <path class="vault-contour" d="M 256 140
             C 320 140, 360 160, 360 210
             C 360 300, 290 350, 256 380
             C 222 350, 152 300, 152 210
             C 152 160, 192 140, 256 140 Z"
          fill="none"
          stroke="url(#brandGrad)"
          stroke-width="12"
          stroke-linejoin="round"/>

    <!--
      Hourglass Rotator Group — uses SMIL for rotation.

      NO CLIP PATHS — sand is drawn as <polygon> shapes whose points
      are animated directly via SMIL. The polygon shape IS the sand,
      matching the glass outline exactly. No clipping artifacts possible.

      Timing (18s cycle):
        0%–43.33%   Hold 0°,   upper drains, lower fills
        43.33%–50%  Flip 180°, sand holds
        50%–93.33%  Hold 180°, upper refills, lower re-drains
        93.33%–100% Flip 360°, sand holds
    -->
    <g>
      <animateTransform
        attributeName="transform"
        type="rotate"
        values="0 256 256; 0 256 256; 180 256 256; 180 256 256; 360 256 256"
        keyTimes="0; 0.4333; 0.5; 0.9333; 1"
        dur="18s"
        calcMode="spline"
        keySplines="0 0 1 1; 0.77 0 0.175 1; 0 0 1 1; 0.77 0 0.175 1"
        repeatCount="indefinite"/>

      <!-- Glass Bulb Outlines -->
      <path d="M 220 190 H 292 L 256 256 Z" fill="none" stroke="url(#brandGrad)" stroke-width="4" opacity="0.3"/>
      <path d="M 256 256 L 220 322 H 292 Z" fill="none" stroke="url(#brandGrad)" stroke-width="4" opacity="0.3"/>

      <!--
        Upper Sand — triangle matching upper glass bulb.
        Phase 1 drain: full → collapse to NECK (256,256) — sand level drops toward neck
        Flip: invisible transition from neck point to base center point
        Phase 2 fill: expand from BASE CENTER (256,190) → full — sand piles up from bottom
        Flip: hold full, loops to phase 1
      -->
      <polygon fill="url(#brandGrad)" opacity="0.8"
               points="220,190 292,190 256,256">
        <animate
          attributeName="points"
          values="
            220,190 292,190 256,256;
            256,256 256,256 256,256;
            256,190 256,190 256,190;
            220,190 292,190 256,256;
            220,190 292,190 256,256"
          keyTimes="0; 0.4333; 0.5; 0.9333; 1"
          dur="18s"
          repeatCount="indefinite"/>
      </polygon>

      <!--
        Lower Sand — triangle matching lower glass bulb.
        Phase 1 fill: expand from BASE CENTER (256,322) → full — sand piles up from bottom
        Flip: hold full
        Phase 2 drain: full → collapse to NECK (256,256) — sand level drops toward neck
        Flip: invisible transition from neck point to base center point, loops
      -->
      <polygon fill="url(#brandGrad)" opacity="0.8"
               points="256,322 256,322 256,322">
        <animate
          attributeName="points"
          values="
            256,322 256,322 256,322;
            256,256 220,322 292,322;
            256,256 220,322 292,322;
            256,256 256,256 256,256;
            256,322 256,322 256,322"
          keyTimes="0; 0.4333; 0.5; 0.9333; 1"
          dur="18s"
          repeatCount="indefinite"/>
      </polygon>
    </g>

    <!--
      Trickle Stream — OUTSIDE rotator, always flows screen-downward.
      Hidden during flips. The hourglass is symmetric so the trickle
      visually stays inside the glass in both orientations.
    -->
    <line class="sand-stream-line" x1="256" y1="258" x2="256" y2="316"
          stroke="url(#brandGrad)" stroke-width="3"
          stroke-dasharray="4 8" stroke-linecap="round">
      <animate
        attributeName="opacity"
        values="0.8; 0.8; 0; 0.8; 0.8; 0; 0.8"
        keyTimes="0; 0.42; 0.4333; 0.5; 0.92; 0.9333; 1"
        dur="18s"
        repeatCount="indefinite"/>
    </line>

    <!-- Core Lock / Switch Lever -->
    <circle class="core-lock" cx="256" cy="256" r="14" fill="#0a0b0d" stroke="url(#brandGrad)" stroke-width="6"/>

    <!-- Active Pulse Switch Hand -->
    <line class="active-hand" x1="256" y1="256" x2="256" y2="210" stroke="url(#brandGrad)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Subtle inner target crosshair -->
  <circle cx="256" cy="256" r="8" fill="url(#brandGrad)"/>
</svg>
